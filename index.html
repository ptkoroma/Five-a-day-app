<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="cart-status">
            <span>🛒 Cart: <span id="cart-count">0</span> items</span>
        </div>
        <h1>Five A Day Summer Collection</h1>
        
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search products...">
            
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="t-shirt">T-Shirts</option>
                <option value="hoody">Hoody</option>
                <option value="soccer-jersey">Soccer Jersey</option>
            </select>

            <select id="price-sort">
                <option value="default">Sort by: Default</option>
                <option value="low-high">Price: Low to High</option>
                <option value="high-low">Price: High to Low</option>
            </select>

            <button id="reset-btn">Reset</button>
        </div>
    </header>

    <main id="product-grid" class="grid-container"></main>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
